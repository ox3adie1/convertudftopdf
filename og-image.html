<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* Background decorative elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }
        .bg-circle-1 {
            width: 500px; height: 500px;
            background: #3b82f6;
            top: -150px; right: -100px;
        }
        .bg-circle-2 {
            width: 400px; height: 400px;
            background: #2563eb;
            bottom: -200px; left: -100px;
        }
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 80px;
        }
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: -0.5px;
        }
        .logo-text small {
            color: #3b82f6;
            font-weight: 600;
        }
        .title {
            font-size: 64px;
            font-weight: 800;
            color: #f8fafc;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }
        .title .highlight {
            color: #60a5fa;
        }
        .subtitle {
            font-size: 24px;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .badge-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin-top: 8px;
        }
        .divider {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3b82f6;
        }
    </style>
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="+xkoyzioDoOn7GkH9gzyMQ" async></script>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-grid"></div>
    <div class="card">
        <div class="logo-row">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="#2563eb"/>
                <path d="M8 10h6v12H8V10zm10 0h6v12h-6V10z" fill="#fff" opacity="0.3"/>
                <path d="M13 16l6-4v8l-6-4z" fill="#fff"/>
            </svg>
            <span class="logo-text">convertudftopdf<small>.com</small></span>
        </div>
        <h1 class="title">UYAP <span class="highlight">.udf</span> → <span class="highlight">PDF</span></h1>
        <div class="badge-row">
            <span class="subtitle">Ücretsiz</span>
            <span class="divider"></span>
            <span class="subtitle">Güvenli</span>
            <span class="divider"></span>
            <span class="subtitle">Tarayıcıda Çalışır</span>
        </div>
    </div>
</body>
</html>
